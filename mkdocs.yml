site_name: AutoShip CLI
site_description: AutoShip-CLI 文档 — 本地优先的智能交付助手
site_author: AutoShip Team
site_url: https://ms33834.github.io/autoship-cli/docs

docs_dir: docs

repo_url: https://github.com/MS33834/autoship-cli
repo_name: MS33834/autoship-cli
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit

nav:
  - 首页: index.md
  - 命令参考:
      - 概览: commands/index.md
      - init: commands/init.md
      - clean: commands/clean.md
      - verify: commands/verify.md
      - fix: commands/fix.md
      - commit: commands/commit.md
      - upload: commands/upload.md
      - plugin: commands/plugin.md
      - doctor: commands/doctor.md
      - audit: commands/audit.md
      - registry: commands/registry.md
      - metrics: commands/metrics.md
      - config: commands/config.md
  - 配置说明: configuration.md
  - 模型配置: models.md
  - 插件: plugins.md
  - 插件开发指南: plugin-development.md
  - 常见问题: faq.md
  - 插件发布指南: plugin-publishing.md
  - Changelog: changelog.md
  - 贡献指南: contributing.md
  - 安全策略: security.md
  - 安全审计: security-audit.md
  - 遥测与隐私: telemetry.md
  - 隐私政策: privacy.md
  - 发布检查清单: release-checklist.md
  - 1.0.0 发布通告: announcement.md
  - 演示录制: demo.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      restrict_base_path: false
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - tables
  - toc:
      permalink: true

plugins:
  - i18n:
      docs_structure: folder
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MS33834/autoship-cli
      name: GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:team@autoship.dev
      name: 联系团队
  version:
    provider: mike

copyright: Copyright &copy; 2026 AutoShip Team
