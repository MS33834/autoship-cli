<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoShip Plugin Registry</title>
  <link rel="stylesheet" href="styles.css" />
  <script id="plugin-data-loader" data-app-script="app.js">
    (function () {
      function loadScript(src) {
        var script = document.createElement("script");
        script.src = src;
        document.body.appendChild(script);
      }
      function loadData() {
        return fetch("../registry/plugins.json")
          .then(function (response) {
            if (!response.ok) throw new Error("Failed to load plugin registry: " + response.status);
            return response.json();
          })
          .then(function (data) {
            window.PLUGIN_REGISTRY = data;
          })
          .catch(function (error) {
            console.error(error);
            window.PLUGIN_REGISTRY = { version: 1, plugins: [] };
          });
      }
      var appScript = document.currentScript.dataset.appScript || "app.js";
      if (typeof window.PLUGIN_REGISTRY !== "undefined") {
        loadScript(appScript);
      } else {
        loadData().then(function () { loadScript(appScript); });
      }
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="brand">AutoShip</a>
      <nav>
        <a href="index.html">Plugins</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="/docs/">Docs</a>
        <a href="https://github.com/MS33834/autoship-cli">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Plugin Registry</h1>
      <p class="lead">Discover, install, and share AutoShip plugins.</p>
    </section>

    <section class="controls">
      <input
        id="search"
        type="search"
        placeholder="Search plugins..."
        aria-label="Search plugins"
      />
      <select id="filter-trust" aria-label="Filter by trust level">
        <option value="">All trust levels</option>
        <option value="builtin">builtin</option>
        <option value="verified">verified</option>
        <option value="community">community</option>
        <option value="untrusted">untrusted</option>
      </select>
      <select id="filter-category" aria-label="Filter by category">
        <option value="">All categories</option>
      </select>
      <select id="sort-by" aria-label="Sort plugins">
        <option value="default">Default</option>
        <option value="downloads">Most downloads</option>
        <option value="rating">Highest rated</option>
        <option value="name">Name</option>
      </select>
    </section>

    <section id="plugin-grid" class="plugin-grid"></section>

    <dialog id="plugin-modal" class="plugin-modal">
      <div class="modal-content">
        <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
        <div id="modal-body"></div>
      </div>
    </dialog>

    <section class="submit">
      <h2>Submit a plugin</h2>
      <p>
        Have a plugin to share? Open a submission issue on
        <a href="https://github.com/MS33834/autoship-cli/issues">GitHub</a>.
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 AutoShip. Plugins listed are provided by their respective authors.</p>
    </div>
  </footer>

</body>
</html>
