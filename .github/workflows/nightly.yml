name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-check:
    name: Full check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: autoship-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type check
        run: uv run pyright

      - name: Run tests
        run: uv run pytest -q

      - name: Security scan
        run: uv run bandit -r src -ll

      - name: Dependency vulnerability audit
        run: uv run pip-audit --desc

      - name: Build package
        run: uv build

      - name: Run benchmark
        run: uv run python benchmarks/benchmark.py

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: autoship-cli/benchmarks/results.json

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly build failed on ${new Date().toISOString()}`,
              body: `See ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["nightly", "ci-failure"]
            });

  nightly-artifacts:
    name: Nightly artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: full-check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    defaults:
      run:
        working-directory: autoship-cli
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Build nightly wheel and sdist
        if: matrix.os == 'ubuntu-latest'
        run: uv build

      - name: Upload nightly wheel and sdist
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-dist
          path: autoship-cli/dist/*

      - name: Build executable
        run: |
          uv run pyinstaller --onefile --name autoship src/autoship/__main__.py
          mkdir -p dist/bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/autoship.exe "dist/bin/autoship-${{ matrix.os }}.exe"
          else
            mv dist/autoship "dist/bin/autoship-${{ matrix.os }}"
          fi

      - name: Generate SHA256 checksum
        run: |
          uv run python - <<'PY'
          import hashlib
          import pathlib
          import sys

          suffix = ".exe" if sys.platform == "win32" else ""
          binary = pathlib.Path(f"dist/bin/autoship-${{ matrix.os }}{suffix}")
          checksum = hashlib.sha256(binary.read_bytes()).hexdigest()
          binary.with_name(binary.name + ".sha256").write_text(checksum + "\n", encoding="utf-8")
          PY

      - name: Upload nightly binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: autoship-cli/dist/bin/*
