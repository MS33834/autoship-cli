name: Plugin Registry Review

on:
  pull_request:
    paths:
      - 'src/autoship/registry/plugins.json'
      - '.github/workflows/plugin_review.yml'
      - 'scripts/validate_registry.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Validate registry index
        id: validate
        run: python scripts/validate_registry.py
      - name: Comment PR on failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Plugin registry validation failed. Please check the workflow logs and fix the reported issues.'
            })
