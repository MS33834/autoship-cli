name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      repository:
        description: "PyPI repository to publish to"
        required: true
        default: "pypi"
        type: choice
        options:
          - "pypi"
          - "testpypi"

permissions:
  contents: write
  id-token: write

jobs:
  resolve-target:
    name: Resolve publish target
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.resolve.outputs.repository }}
      repository-url: ${{ steps.resolve.outputs.repository-url }}
    steps:
      - name: Resolve target repository
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.repository }}"
          elif [[ "${{ github.ref_name }}" =~ -(a|b|rc)[0-9]+$ ]]; then
            target="testpypi"
          else
            target="pypi"
          fi
          if [ "$target" = "testpypi" ]; then
            url="https://test.pypi.org/legacy/"
          else
            url="https://pypi.org/legacy/"
          fi
          echo "repository=$target" >> "$GITHUB_OUTPUT"
          echo "repository-url=$url" >> "$GITHUB_OUTPUT"
          echo "Publishing to $target ($url)"

  pypi:
    name: Publish autoship to ${{ needs.resolve-target.outputs.repository }}
    runs-on: ubuntu-latest
    needs: resolve-target
    environment:
      name: ${{ needs.resolve-target.outputs.repository }}
      url: ${{ needs.resolve-target.outputs.repository-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint, type check, and test
        run: |
          uv run ruff check src tests dogfood benchmarks
          uv run pyright
          uv run pytest -q

      - name: Build autoship
        run: |
          uv build --package autoship --out-dir dist

      - name: Verify autoship wheel metadata
        run: |
          wheel=$(ls dist/autoship-*.whl | head -n 1)
          unzip -p "$wheel" 'autoship-*.dist-info/METADATA' | grep -E '^Requires-Dist:' || true

      - name: Publish autoship to ${{ needs.resolve-target.outputs.repository }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: ${{ needs.resolve-target.outputs.repository-url }}

  pypi-sdk:
    name: Publish autoship-sdk to ${{ needs.resolve-target.outputs.repository }}
    runs-on: ubuntu-latest
    needs: [resolve-target, pypi]
    environment:
      name: ${{ needs.resolve-target.outputs.repository }}
      url: ${{ needs.resolve-target.outputs.repository-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync SDK dependencies
        working-directory: autoship-sdk
        run: uv sync --dev

      - name: Lint, type check, and test SDK
        working-directory: autoship-sdk
        run: |
          uv run ruff check src tests
          uv run pyright
          uv run pytest -q

      - name: Build autoship-sdk
        run: uv build --package autoship-sdk --out-dir autoship-sdk/dist

      - name: Verify autoship-sdk wheel metadata
        run: |
          wheel=$(ls autoship-sdk/dist/autoship_sdk-*.whl | head -n 1)
          unzip -p "$wheel" 'autoship_sdk-*.dist-info/METADATA' | grep -E '^Requires-Dist:' || true

      - name: Publish autoship-sdk to ${{ needs.resolve-target.outputs.repository }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: autoship-sdk/dist
          repository-url: ${{ needs.resolve-target.outputs.repository-url }}

  build-binaries:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Build executable
        shell: bash
        run: |
          uv run pyinstaller --onefile --name autoship --collect-all autoship src/autoship/__main__.py
          mkdir -p dist/bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/autoship.exe "dist/bin/autoship-${{ matrix.os }}.exe"
          else
            mv dist/autoship "dist/bin/autoship-${{ matrix.os }}"
          fi

      - name: Smoke test Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          ./dist/bin/autoship-${{ matrix.os }} --help
          ./dist/bin/autoship-${{ matrix.os }} doctor

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          uv run python - <<'PY'
          import hashlib
          import pathlib
          import sys

          suffix = ".exe" if sys.platform == "win32" else ""
          binary = pathlib.Path(f"dist/bin/autoship-${{ matrix.os }}{suffix}")
          checksum = hashlib.sha256(binary.read_bytes()).hexdigest()
          binary.with_name(binary.name + ".sha256").write_text(checksum + "\n", encoding="utf-8")
          PY

      - name: Generate SBOM
        if: runner.os == 'Linux'
        run: uv run cyclonedx-py environment -o dist/bin/sbom.json --pyproject pyproject.toml

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: dist/bin/*

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [resolve-target, pypi, pypi-sdk, build-binaries]
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ needs.resolve-target.outputs.repository == 'testpypi' }}
          files: artifacts/*
