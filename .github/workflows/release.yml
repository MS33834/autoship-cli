name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  pypi:
    name: Publish autoship to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint, type check, and test
        run: |
          uv run ruff check src tests
          uv run pyright
          uv run pytest -q

      - name: Build distributions
        run: uv build

      - name: Publish autoship to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  pypi-sdk:
    name: Publish autoship-sdk to PyPI
    runs-on: ubuntu-latest
    needs: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync SDK dependencies
        working-directory: autoship-sdk
        run: uv sync --dev

      - name: Lint, type check, and test SDK
        working-directory: autoship-sdk
        run: |
          uv run ruff check src tests
          uv run pyright
          uv run pytest -q

      - name: Build SDK distributions
        run: uv build --package autoship-sdk --out-dir autoship-sdk/dist

      - name: Publish autoship-sdk to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: autoship-sdk/dist

  build-binaries:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Build executable
        shell: bash
        run: |
          uv run pyinstaller --onefile --name autoship src/autoship/__main__.py
          mkdir -p dist/bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/autoship.exe "dist/bin/autoship-${{ matrix.os }}.exe"
          else
            mv dist/autoship "dist/bin/autoship-${{ matrix.os }}"
          fi

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          uv run python - <<'PY'
          import hashlib
          import pathlib
          import sys

          suffix = ".exe" if sys.platform == "win32" else ""
          binary = pathlib.Path(f"dist/bin/autoship-${{ matrix.os }}{suffix}")
          checksum = hashlib.sha256(binary.read_bytes()).hexdigest()
          binary.with_name(binary.name + ".sha256").write_text(checksum + "\n", encoding="utf-8")
          PY

      - name: Generate SBOM
        if: runner.os == 'Linux'
        run: uv run cyclonedx-py environment -o dist/bin/sbom.json --pyproject pyproject.toml

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: dist/bin/*

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [pypi, pypi-sdk, build-binaries]
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
