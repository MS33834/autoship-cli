name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and run gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! command -v gitleaks >/dev/null 2>&1; then
            os=$(uname -s | tr '[:upper:]' '[:lower:]')
            arch=$(uname -m)
            case "$arch" in
              x86_64|amd64) arch=x64 ;;
              aarch64|arm64) arch=arm64 ;;
            esac
            version=$(gh api repos/gitleaks/gitleaks/releases/latest --jq '.tag_name')
            curl -sL "https://github.com/gitleaks/gitleaks/releases/download/${version}/gitleaks_${version}_${os}_${arch}.tar.gz" | tar xz -C /tmp
            sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          fi
          gitleaks detect --source . --no-banner

      - name: Run bandit
        run: uv run bandit -r src -f json

  lint-and-test:
    name: Lint / Type check / Test
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          - python-version: "3.14"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run pyright

      - name: Run tests
        run: uv run pytest -q

      - name: Dependency vulnerability audit
        run: uv run pip-audit --desc
