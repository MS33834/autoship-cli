name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install and run gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! command -v gitleaks >/dev/null 2>&1; then
            os=$(uname -s | tr '[:upper:]' '[:lower:]')
            arch=$(uname -m)
            case "$arch" in
              x86_64|amd64) arch=x64 ;;
              aarch64|arm64) arch=arm64 ;;
            esac
            version=$(gh api repos/gitleaks/gitleaks/releases/latest --jq '.tag_name')
            version=${version#v}
            curl -sL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_${os}_${arch}.tar.gz" | tar xz -C /tmp
            sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          fi
          gitleaks detect --source . --no-banner

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Run bandit
        run: uv run bandit -r src -f json -c pyproject.toml

  lint-and-test:
    name: Lint / Type check / Test
    runs-on: ubuntu-latest
    needs: security-scan
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        experimental: [false]
        include:
          - python-version: "3.14"
            experimental: true
    continue-on-error: ${{ matrix.experimental }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Lint
        run: uv run ruff check src tests dogfood benchmarks

      - name: Type check
        run: uv run pyright

      - name: Run tests
        run: uv run pytest -q -m 'not integration'

      - name: Run SDK tests
        run: uv run pytest autoship-sdk/tests -q -m 'not integration'

      - name: Dependency vulnerability audit
        run: uv run pip-audit --desc

  integration-tests:
    name: Dogfood / Benchmarks
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Install clean toolchain tools
        run: uv pip install autoflake black isort

      - name: Run dogfood smoke tests
        run: uv run python dogfood/dogfood.py

      - name: Upload dogfood reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dogfood-reports
          path: |
            dogfood/report.md
            dogfood/report.json

      - name: Run benchmarks
        run: uv run python benchmarks/benchmark.py

      - name: Upload benchmark reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-reports
          path: |
            benchmarks/report.md
            benchmarks/results.json

  ai-backend-integration:
    name: AI backend integration tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Run AI backend integration tests
        run: uv run pytest tests/integration/ai_backends -q
        env:
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OLLAMA_MODEL: ${{ vars.OLLAMA_MODEL }}
          LM_STUDIO_BASE_URL: ${{ vars.LM_STUDIO_BASE_URL }}
          LM_STUDIO_MODEL: ${{ vars.LM_STUDIO_MODEL }}
          LM_STUDIO_API_KEY: ${{ secrets.LM_STUDIO_API_KEY }}
