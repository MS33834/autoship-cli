name: 功能请求
description: 为 autoship 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您为 autoship 的发展出谋划策！请详细描述您的想法。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 痛点
      description: 您在使用 autoship 时遇到了什么问题？这个功能和什么问题相关？
      placeholder: 例如：每次生成提交信息后，我都需要手动润色，希望能支持自定义提示词模板。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 您希望 autoship 如何解决这个问题？
      placeholder: 例如：在配置文件中增加 `prompt_template` 字段，允许用户覆盖默认提示词。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您是否考虑过其他实现方式？它们有什么优缺点？
      placeholder: 例如：通过环境变量传入提示词，但不如配置文件方便管理。
    validations:
      required: false

  - type: dropdown
    id: contribute
    attributes:
      label: 是否愿意贡献代码？
      description: 如果您愿意实现该功能，我们将非常欢迎。
      options:
        - 是，我愿意提交 PR
        - 我可以协助测试或文档
        - 暂时没有精力
    validations:
      required: false
